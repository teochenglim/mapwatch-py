worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $request_method $request_uri $status '
                      '$body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;
    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip  off;   # PNG tiles are already compressed

    # Allow embedding from any origin (needed by Leaflet map pages)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Cache-Control "public, max-age=86400" always;

    server {
        listen 80;
        server_name _;

        root /tiles;

        # Health check — used by K8s readinessProbe
        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Tile requests: /{layer}/{z}/{x}/{y}.png
        # Traefik stripPrefix removes the route prefix before forwarding here,
        # so the pod always receives paths starting with /{layer}/...
        location ~ ^/([a-z]+)/(\d+)/(\d+)/(\d+)\.png$ {
            try_files $uri =404;
            add_header X-Tile-Source "local-cache" always;
        }

        # Friendly 404 for unknown paths
        location / {
            return 404 "tile not found\n";
            add_header Content-Type text/plain;
        }
    }
}
