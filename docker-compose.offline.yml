# Offline mode — pre-downloaded tiles served from local directories.
#
# Usage:
#   # 1. Download tiles first (only needed once per zoom change)
#   make tilemap-download ZOOM_MIN=10 ZOOM_MAX=19 LAYERS=dark
#
#   # 2. Start the full stack
#   docker compose -f docker-compose.offline.yml up
#   docker compose -f docker-compose.offline.yml up --build   # rebuild app
#
# Tile behaviour:
#   TILE_MODE=offline → the built-in /tiles proxy returns 404 on cache miss
#   instead of fetching from CDN.  Tiles are served exclusively from the
#   tilemap-server-*/tiles/ directories mounted into dedicated nginx containers.
#   No internet access required once tiles are downloaded.
#
# Prerequisites:
#   Tiles must be pre-downloaded into tilemap-server-{layer}/tiles/ using the
#   download script.  See NEW_TILE.md for details.
#   Quickstart: make tilemap-download ZOOM_MIN=10 ZOOM_MAX=19 LAYERS=dark,light,streets
#
# Production equivalent:
#   GitHub Actions bakes the same tiles into Docker images; K8s deploys them.
#   This compose mirrors that setup using local bind-mounts instead of images.

services:

  # ── Reverse proxy — routes subpaths to the right backend ─────────────────────
  proxy:
    build:
      context: ./proxy
    image: ghcr.io/teochenglim/mapwatch-py/proxy:${IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - app
      - tilemap-dark
      - tilemap-light
      - tilemap-streets
    restart: unless-stopped

  # ── mapwatch-py app ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
    image: ghcr.io/teochenglim/mapwatch-py:${IMAGE_TAG:-latest}
    environment:
      ROOT_PATH:       /department/mapwatch-py
      TILE_SERVER_URL: "${BASE_URL:-http://localhost:8000}/department/tilemap-server"
      TILE_MODE:       offline
      BASE_URL:        "${BASE_URL:-http://localhost:8000}"
    depends_on:
      - tilemap-dark
      - tilemap-light
      - tilemap-streets
    restart: unless-stopped

  # ── tilemap-server — one nginx per layer, tiles mounted from local disk ───────
  #
  # These mirror the CI-built tilemap-server-* images but use local bind-mounts
  # instead of baked-in tiles.  Run `make tilemap-download` first to populate
  # the tile directories.

  tilemap-dark:
    image: nginx:1.27-alpine
    volumes:
      - ./tilemap-server-dark/tiles:/tiles:ro
      - ./tilemap-nginx-local.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tilemap-light:
    image: nginx:1.27-alpine
    volumes:
      - ./tilemap-server-light/tiles:/tiles:ro
      - ./tilemap-nginx-local.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tilemap-streets:
    image: nginx:1.27-alpine
    volumes:
      - ./tilemap-server-streets/tiles:/tiles:ro
      - ./tilemap-nginx-local.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
