# Offline mode — tiles served from pre-built GHCR images (no local download needed).
#
# Usage:
#   docker compose -f docker-compose.offline.yml up
#   docker compose -f docker-compose.offline.yml up --build   # rebuild app/proxy
#
# Tile behaviour:
#   TILE_MODE=offline → the built-in /tiles proxy returns 404 on cache miss
#   instead of fetching from CDN.  Tiles are served exclusively from the
#   tilemap-server-* images pulled from GHCR.
#   No internet access required at runtime (tiles are baked into the images).
#
# Prerequisites:
#   docker login ghcr.io  (once, to pull private GHCR images)
#
# Production equivalent:
#   GitHub Actions bakes tiles into the same GHCR images; K8s deploys them.
#   This compose uses those same images directly.

services:

  # ── Reverse proxy — routes subpaths to the right backend ─────────────────────
  proxy:
    build:
      context: ./proxy
    image: ghcr.io/teochenglim/mapwatch-py/proxy:${IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - app
      - tilemap-dark
      - tilemap-light
      - tilemap-streets
    restart: unless-stopped

  # ── mapwatch-py app ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
    image: ghcr.io/teochenglim/mapwatch-py:${IMAGE_TAG:-latest}
    environment:
      ROOT_PATH:       /department/mapwatch-py
      TILE_SERVER_URL: "${BASE_URL:-http://localhost:8000}/department/tilemap-server"
      TILE_MODE:       offline
      BASE_URL:        "${BASE_URL:-http://localhost:8000}"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - tilemap-dark
      - tilemap-light
      - tilemap-streets
    restart: unless-stopped

  # ── tilemap-server — one container per layer, tiles baked into GHCR image ─────

  tilemap-dark:
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-dark:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tilemap-light:
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-light:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  tilemap-streets:
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-streets:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
