name: Build and push Docker images

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

  # Allow manually re-running to refresh the tile cache.
  # Bump tile_cache_bust to force a fresh download of all tiles.
  workflow_dispatch:
    inputs:
      tile_cache_bust:
        description: 'Bump to force a fresh tile download (e.g. 2)'
        required: false
        default: '1'

env:
  REGISTRY:    ghcr.io
  APP_IMAGE:   ghcr.io/teochenglim/mapwatch-py
  PROXY_IMAGE: ghcr.io/teochenglim/mapwatch-py/proxy

jobs:

  # ── Build mapwatch-py app image ─────────────────────────────────────────────
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push mapwatch-py
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Build proxy image ────────────────────────────────────────────────────────
  build-proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Download tiles (parallelised by layer × zoom band) ───────────────────────
  #
  # Tile count grows ~4× per zoom level. At z19, Singapore has ~330 k tiles per
  # layer — too slow for one sequential job. Strategy:
  #
  #   z10–z17  : single job per layer    (fast — a few thousand tiles)
  #   z18      : 2 jobs per layer        (split x-range in half)
  #   z19      : 6 jobs per layer        (split x-range into sixths)
  #
  # Total: 9 bands × 3 layers = 27 parallel download jobs.
  # Each job targets a distinct, non-overlapping set of tiles so artifacts merge
  # cleanly. The GitHub Actions cache avoids re-downloading across runs.
  #
  # Wall-clock estimate (assuming z18 full ≈ 6 h per layer):
  #   z19/6-parts ≈ 4×6 h / 6 ≈ 4 h   ← dominant job
  #   Total wall clock: ~4–5 h (download) + ~30 min (build) ≈ ~5 h

  download-tiles:
    name: tiles ${{ matrix.layer }} ${{ matrix.band.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # don't cancel siblings if one part fails
      matrix:
        layer: [dark, light, streets]
        band:
          # z10–z17: tiny combined — all fit in one fast job
          - { name: low,    zoom_min: 10, zoom_max: 17, x_part: ""  }
          # z18: split x-range into 2 parts (~3 h each)
          - { name: z18-p1, zoom_min: 18, zoom_max: 18, x_part: "1/2" }
          - { name: z18-p2, zoom_min: 18, zoom_max: 18, x_part: "2/2" }
          # z19: split x-range into 6 parts (~4 h each)
          - { name: z19-p1, zoom_min: 19, zoom_max: 19, x_part: "1/6" }
          - { name: z19-p2, zoom_min: 19, zoom_max: 19, x_part: "2/6" }
          - { name: z19-p3, zoom_min: 19, zoom_max: 19, x_part: "3/6" }
          - { name: z19-p4, zoom_min: 19, zoom_max: 19, x_part: "4/6" }
          - { name: z19-p5, zoom_min: 19, zoom_max: 19, x_part: "5/6" }
          - { name: z19-p6, zoom_min: 19, zoom_max: 19, x_part: "6/6" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Restore previously downloaded tiles for this exact band.
      # Cache key includes bust counter so a manual re-run forces fresh download.
      - name: Restore tile cache
        id: cache
        uses: actions/cache@v4
        with:
          path: tilemap-server-${{ matrix.layer }}/tiles
          key: sg-tiles-${{ matrix.layer }}-${{ matrix.band.name }}-v${{ github.event.inputs.tile_cache_bust || '1' }}

      - name: Download tiles
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x tilemap-server-${{ matrix.layer }}/download-sg-tiles.sh

          X_PART_ARG=""
          if [ -n "${{ matrix.band.x_part }}" ]; then
            X_PART_ARG="--x-part ${{ matrix.band.x_part }}"
          fi

          # CartoDB: 2–4 parallel is safe.
          # OSM (streets): keep parallel 1 — they request ≤2 req/s.
          PARALLEL=1
          if [ "${{ matrix.layer }}" != "streets" ]; then
            PARALLEL=4
          fi

          tilemap-server-${{ matrix.layer }}/download-sg-tiles.sh \
            --zoom-min  ${{ matrix.band.zoom_min }} \
            --zoom-max  ${{ matrix.band.zoom_max }} \
            --layers    ${{ matrix.layer }} \
            --out       tilemap-server-${{ matrix.layer }}/tiles \
            --parallel  "$PARALLEL" \
            $X_PART_ARG

      - name: Show tile count
        run: |
          total=$(find tilemap-server-${{ matrix.layer }}/tiles -name '*.png' 2>/dev/null | wc -l || echo 0)
          size=$(du -sh tilemap-server-${{ matrix.layer }}/tiles 2>/dev/null | cut -f1 || echo "0")
          echo "${{ matrix.layer }} / ${{ matrix.band.name }}: ${total} tiles, ${size}"

      # Upload tiles as artifact so the build job can merge all bands together.
      # PNGs are already compressed — skip re-compression (compression-level: 0).
      - name: Upload tiles as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiles-${{ matrix.layer }}-${{ matrix.band.name }}
          path: tilemap-server-${{ matrix.layer }}/tiles/
          compression-level: 0
          if-no-files-found: error

  # ── Build tilemap-server images (one per layer, all zoom bands merged) ───────
  #
  # Runs after ALL download-tiles matrix jobs complete.
  # Downloads every artifact for this layer, merges into one tile tree,
  # then bakes it into the Docker image.

  build-tilemap:
    name: build tilemap-server-${{ matrix.layer }}
    needs: [download-tiles]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        layer: [dark, light, streets]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download and merge all band artifacts for this layer into one directory.
      # merge-multiple: true flattens all matching artifacts into the target path.
      - name: Download and merge tile artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tiles-${{ matrix.layer }}-*
          path: tilemap-server-${{ matrix.layer }}/tiles/
          merge-multiple: true

      - name: Verify merged tile count
        run: |
          total=$(find tilemap-server-${{ matrix.layer }}/tiles -name '*.png' | wc -l)
          size=$(du -sh  tilemap-server-${{ matrix.layer }}/tiles | cut -f1)
          echo "${{ matrix.layer }}: ${total} total tiles merged, ${size}"
          # Fail fast if suspiciously few tiles — likely a download problem
          if [ "$total" -lt 100 ]; then
            echo "ERROR: fewer than 100 tiles found — aborting build" >&2
            exit 1
          fi

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teochenglim/mapwatch-py/tilemap-server-${{ matrix.layer }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push tilemap-server-${{ matrix.layer }}
        uses: docker/build-push-action@v5
        with:
          context: ./tilemap-server-${{ matrix.layer }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
