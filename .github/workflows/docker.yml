name: Build and push Docker images

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

  # Allow manually re-running to refresh the tile cache
  workflow_dispatch:
    inputs:
      tile_cache_bust:
        description: 'Bump this number to force a fresh tile download (e.g. 2)'
        required: false
        default: '1'

env:
  REGISTRY:    ghcr.io
  APP_IMAGE:   ghcr.io/teochenglim/mapwatch-py
  PROXY_IMAGE: ghcr.io/teochenglim/mapwatch-py/proxy

  # Tile download settings — z19 is the max for CartoDB and OSM
  TILE_ZOOM_MIN: '10'
  TILE_ZOOM_MAX: '18'

jobs:

  # ── Build mapwatch-py app image ─────────────────────────────────────────────
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push mapwatch-py
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Build proxy image ────────────────────────────────────────────────────────
  build-proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROXY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push proxy
        uses: docker/build-push-action@v5
        with:
          context: ./proxy
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Build tilemap-server images (one per layer, tiles baked in) ─────────────
  build-tilemap-dark:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tile cache key
        id: tile-key
        run: |
          bust="${{ github.event.inputs.tile_cache_bust || '1' }}"
          echo "key=sg-tiles-dark-z${TILE_ZOOM_MIN}-z${TILE_ZOOM_MAX}-v${bust}" >> "$GITHUB_OUTPUT"

      - name: Restore tile cache
        id: tile-cache
        uses: actions/cache@v4
        with:
          path: tilemap-server-dark/tiles
          key: ${{ steps.tile-key.outputs.key }}

      - name: Download dark tiles
        if: steps.tile-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x tilemap-server-dark/download-sg-tiles.sh
          tilemap-server-dark/download-sg-tiles.sh \
            --zoom-min "$TILE_ZOOM_MIN" \
            --zoom-max "$TILE_ZOOM_MAX" \
            --layers   dark \
            --out      tilemap-server-dark/tiles

      - name: Show tile count
        run: |
          total=$(find tilemap-server-dark/tiles -name '*.png' | wc -l)
          size=$(du -sh tilemap-server-dark/tiles | cut -f1)
          echo "dark tiles: ${total} files, ${size}"

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teochenglim/mapwatch-py/tilemap-server-dark
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push tilemap-server-dark
        uses: docker/build-push-action@v5
        with:
          context: ./tilemap-server-dark
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-tilemap-light:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tile cache key
        id: tile-key
        run: |
          bust="${{ github.event.inputs.tile_cache_bust || '1' }}"
          echo "key=sg-tiles-light-z${TILE_ZOOM_MIN}-z${TILE_ZOOM_MAX}-v${bust}" >> "$GITHUB_OUTPUT"

      - name: Restore tile cache
        id: tile-cache
        uses: actions/cache@v4
        with:
          path: tilemap-server-light/tiles
          key: ${{ steps.tile-key.outputs.key }}

      - name: Download light tiles
        if: steps.tile-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x tilemap-server-light/download-sg-tiles.sh
          tilemap-server-light/download-sg-tiles.sh \
            --zoom-min "$TILE_ZOOM_MIN" \
            --zoom-max "$TILE_ZOOM_MAX" \
            --layers   light \
            --out      tilemap-server-light/tiles

      - name: Show tile count
        run: |
          total=$(find tilemap-server-light/tiles -name '*.png' | wc -l)
          size=$(du -sh tilemap-server-light/tiles | cut -f1)
          echo "light tiles: ${total} files, ${size}"

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teochenglim/mapwatch-py/tilemap-server-light
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push tilemap-server-light
        uses: docker/build-push-action@v5
        with:
          context: ./tilemap-server-light
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-tilemap-streets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tile cache key
        id: tile-key
        run: |
          bust="${{ github.event.inputs.tile_cache_bust || '1' }}"
          echo "key=sg-tiles-streets-z${TILE_ZOOM_MIN}-z${TILE_ZOOM_MAX}-v${bust}" >> "$GITHUB_OUTPUT"

      - name: Restore tile cache
        id: tile-cache
        uses: actions/cache@v4
        with:
          path: tilemap-server-streets/tiles
          key: ${{ steps.tile-key.outputs.key }}

      - name: Download streets tiles
        if: steps.tile-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x tilemap-server-streets/download-sg-tiles.sh
          tilemap-server-streets/download-sg-tiles.sh \
            --zoom-min "$TILE_ZOOM_MIN" \
            --zoom-max "$TILE_ZOOM_MAX" \
            --layers   streets \
            --out      tilemap-server-streets/tiles

      - name: Show tile count
        run: |
          total=$(find tilemap-server-streets/tiles -name '*.png' | wc -l)
          size=$(du -sh tilemap-server-streets/tiles | cut -f1)
          echo "streets tiles: ${total} files, ${size}"

      - name: Get 8-char commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teochenglim/mapwatch-py/tilemap-server-streets
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.sha.outputs.short }}
            type=raw,value=v1

      - name: Build and push tilemap-server-streets
        uses: docker/build-push-action@v5
        with:
          context: ./tilemap-server-streets
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
