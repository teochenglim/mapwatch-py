name: Build and push Docker images

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

  # Allow manually re-running to refresh the tile cache
  workflow_dispatch:
    inputs:
      tile_cache_bust:
        description: 'Bump this number to force a fresh tile download (e.g. 2)'
        required: false
        default: '1'

env:
  REGISTRY:   ghcr.io
  APP_IMAGE:  ghcr.io/teochenglim/mapwatch-py
  TILE_IMAGE: ghcr.io/teochenglim/mapwatch-py/tilemap-server

  # Tile download settings — adjust zoom/layers to control image size
  # Rough size: dark+streets z10-z15 ≈ 80–150 MB of PNG tiles
  TILE_ZOOM_MIN: '10'
  TILE_ZOOM_MAX: '15'
  TILE_LAYERS:   'dark,streets'

jobs:

  # ── Build mapwatch-py app image ─────────────────────────────────────────────
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push mapwatch-py
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Build tilemap-server image (with tiles baked in) ────────────────────────
  build-tilemap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Restore tile cache ──────────────────────────────────────────────────
      # Cache key includes zoom range, layers, and an optional bust number so
      # you can force a refresh via workflow_dispatch without changing code.
      - name: Restore tile cache
        id: tile-cache
        uses: actions/cache@v4
        with:
          path: tilemap-server/tiles
          key: sg-tiles-z${{ env.TILE_ZOOM_MIN }}-z${{ env.TILE_ZOOM_MAX }}-${{ env.TILE_LAYERS }}-v${{ github.event.inputs.tile_cache_bust || '1' }}

      # ── Download tiles (only on cache miss) ────────────────────────────────
      - name: Download Singapore tiles
        if: steps.tile-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x tilemap-server/download-sg-tiles.sh
          tilemap-server/download-sg-tiles.sh \
            --zoom-min "$TILE_ZOOM_MIN" \
            --zoom-max "$TILE_ZOOM_MAX" \
            --layers   "$TILE_LAYERS" \
            --out      tilemap-server/tiles

      - name: Show tile count
        run: |
          total=$(find tilemap-server/tiles -name '*.png' | wc -l)
          size=$(du -sh tilemap-server/tiles | cut -f1)
          echo "Tiles baked in: ${total} files, ${size}"

      # ── Build and push image ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TILE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push tilemap-server
        uses: docker/build-push-action@v5
        with:
          context: ./tilemap-server
          push: ${{ github.event_name != 'pull_request' }}
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No GHA layer cache for tile image — tiles are large and change rarely.
          # The tile download step above is cached separately via actions/cache.
