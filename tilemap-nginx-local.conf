# Nginx config for local offline tilemap-server containers.
# Used by docker-compose.offline.yml.  Each container mounts its own tile
# directory at /tiles; this config serves them with cache headers and CORS.
#
# URL pattern expected by the proxy:
#   GET /{layer}/{z}/{x}/{y}.png  →  /tiles/{layer}/{z}/{x}/{y}.png

worker_processes 1;
events { worker_connections 256; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  gzip         off;   # PNG tiles are already compressed

  server {
    listen 80;
    server_name _;

    location /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      root  /tiles;
      try_files $uri =404;
      add_header Cache-Control            "public, max-age=86400" always;
      add_header Access-Control-Allow-Origin "*"                  always;
      add_header X-Tile-Source            "local-offline"         always;
    }
  }
}
