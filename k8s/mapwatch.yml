---
# ConfigMap — edit BASE_URL for your air-gapped domain
apiVersion: v1
kind: ConfigMap
metadata:
  name: mapwatch-config
data:
  BASE_URL: "http://localhost:8000"
  ROOT_PATH: "/department/mapwatch-py"
  TILE_SERVER_URL: "http://localhost:8000/department/tilemap-server"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapwatch-py
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mapwatch-py
  template:
    metadata:
      labels:
        app: mapwatch-py
    spec:
      containers:
        - name: mapwatch-py
          image: ghcr.io/teochenglim/mapwatch-py:v1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mapwatch-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /department/mapwatch-py/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mapwatch-data

---
apiVersion: v1
kind: Service
metadata:
  name: mapwatch-py
spec:
  selector:
    app: mapwatch-py
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mapwatch-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
