---
# ── Nginx sidecar config — serves tiles under /department/tilemap-server/ ─────
apiVersion: v1
kind: ConfigMap
metadata:
  name: tilemap-nginx
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 256; }

    http {
      include      /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile     on;
      gzip         off;  # PNG tiles are already compressed

      add_header Access-Control-Allow-Origin  "*" always;
      add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
      add_header Cache-Control "public, max-age=86400" always;

      server {
        listen 80;
        server_name _;

        location /healthz {
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }

        # Tiles served with full prefix path from Ingress
        location /department/tilemap-server/ {
          alias /tiles/;
          try_files $uri =404;
          add_header X-Tile-Source "local-cache" always;
        }

        location / {
          return 404 "tile not found\n";
          add_header Content-Type text/plain;
        }
      }
    }

---
# ── tilemap-dark ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tilemap-dark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tilemap-dark
  template:
    metadata:
      labels:
        app: tilemap-dark
    spec:
      initContainers:
        - name: tile-data
          image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-dark:v1
          command: ["/bin/sh", "-c", "cp -r /tiles/. /shared-tiles/"]
          volumeMounts:
            - name: tiles
              mountPath: /shared-tiles
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tiles
              mountPath: /tiles
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: tiles
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: tilemap-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: tilemap-dark
spec:
  selector:
    app: tilemap-dark
  ports:
    - port: 80
      targetPort: 80

