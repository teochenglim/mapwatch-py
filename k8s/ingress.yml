---
# Ingress — nginx-ingress controller
# For Traefik: see traefik annotations below (commented out)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mapwatch-ingress
  annotations:
    # nginx-ingress: strip path prefix before forwarding
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # ── Traefik alternative (uncomment and remove nginx annotations) ──────────
    # traefik.ingress.kubernetes.io/router.middlewares: mapwatch-strip-mapwatch@kubernetescrd,mapwatch-strip-tilemap@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /department/mapwatch-py(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: mapwatch-py
                port:
                  number: 8000
          - path: /department/tilemap-server(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: tilemap-server
                port:
                  number: 80

---
