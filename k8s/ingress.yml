---
# Ingress — no rewrite rules needed; each pod's nginx sidecar handles its own prefix.
#
# nginx-ingress controller (default):
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mapwatch-ingress
spec:
  rules:
    - http:
        paths:
          - path: /department/mapwatch-py
            pathType: Prefix
            backend:
              service:
                name: mapwatch-py
                port:
                  number: 80
          - path: /department/tilemap-server/dark
            pathType: Prefix
            backend:
              service:
                name: tilemap-dark
                port:
                  number: 80
          - path: /department/tilemap-server/light
            pathType: Prefix
            backend:
              service:
                name: tilemap-light
                port:
                  number: 80
          - path: /department/tilemap-server/streets
            pathType: Prefix
            backend:
              service:
                name: tilemap-streets
                port:
                  number: 80

