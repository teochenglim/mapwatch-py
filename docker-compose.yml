services:

  # ── Reverse proxy — routes subpaths to the right backend ─────────────────────
  # http://localhost:8000/department/mapwatch-py/
  # http://localhost:8000/department/tilemap-server/
  proxy:
    build:
      context: ./proxy
    image: ghcr.io/teochenglim/mapwatch-py/proxy:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    depends_on:
      - app
      - tilemap-server
    restart: unless-stopped

  # ── mapwatch-py app ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
    image: ghcr.io/teochenglim/mapwatch-py:${IMAGE_TAG:-latest}
    environment:
      ROOT_PATH: /department/mapwatch-py
      TILE_SERVER_URL: "${BASE_URL:-http://localhost:8000}/department/tilemap-server"
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
    restart: unless-stopped
    depends_on:
      - tilemap-server

  # ── tilemap-server — tiles baked into image by CI, no volume needed ──────────
  tilemap-server:
    build:
      context: ./tilemap-server
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server:${IMAGE_TAG:-latest}
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      ROOT_PATH: /department/tilemap-server
    restart: unless-stopped
