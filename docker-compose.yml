services:

  # ── Reverse proxy — routes subpaths to the right backend ─────────────────────
  # http://localhost:8000/department/mapwatch-py/
  # http://localhost:8000/department/tilemap-server/
  proxy:
    build:
      context: ./proxy
    image: ghcr.io/teochenglim/mapwatch-py/proxy:${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    depends_on:
      - app
      - tilemap-dark
      - tilemap-light
      - tilemap-streets
    restart: unless-stopped

  # ── mapwatch-py app ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
    image: ghcr.io/teochenglim/mapwatch-py:${IMAGE_TAG:-latest}
    environment:
      ROOT_PATH: /department/mapwatch-py
      TILE_SERVER_URL: "${BASE_URL:-http://localhost:8000}/department/tilemap-server"
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
    restart: unless-stopped
    depends_on:
      - tilemap-dark
      - tilemap-light
      - tilemap-streets

  # ── tilemap-server — one container per layer, tiles baked in by CI ───────────
  tilemap-dark:
    build:
      context: ./tilemap-server-dark
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-dark:${IMAGE_TAG:-latest}
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      ROOT_PATH: /department/tilemap-server
    restart: unless-stopped

  tilemap-light:
    build:
      context: ./tilemap-server-light
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-light:${IMAGE_TAG:-latest}
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      ROOT_PATH: /department/tilemap-server
    restart: unless-stopped

  tilemap-streets:
    build:
      context: ./tilemap-server-streets
    image: ghcr.io/teochenglim/mapwatch-py/tilemap-server-streets:${IMAGE_TAG:-latest}
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      ROOT_PATH: /department/tilemap-server
    restart: unless-stopped
