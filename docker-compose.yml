# Online mode — single container, tiles fetched on-demand from CDN.
#
# Usage:
#   docker compose up           # starts app on http://localhost:8000
#   docker compose up --build   # rebuild app image first
#
# Tile behaviour:
#   TILE_MODE=online → the built-in /tiles proxy fetches missing tiles from the
#   upstream CDN and caches them to a local volume.  No tilemap-server containers
#   needed.  Requires internet access.
#
# For offline tile serving (pre-downloaded tiles, no CDN), use:
#   docker compose -f docker-compose.offline.yml up

services:

  app:
    build:
      context: .
    image: ghcr.io/teochenglim/mapwatch-py:${IMAGE_TAG:-latest}
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      ROOT_PATH:       ""                             # serve at /  (no subpath prefix)
      TILE_SERVER_URL: ""                             # empty → use built-in CDN proxy
      TILE_MODE:       online
      BASE_URL:        "${BASE_URL:-http://localhost:8000}"
    volumes:
      - tile-cache:/app/data/tiles                   # persist CDN tile cache across restarts
    restart: unless-stopped

volumes:
  tile-cache:
